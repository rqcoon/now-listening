server {
    listen 443 ssl;
    server_name api.deepseascreature.com;

    ssl_certificate /etc/letsencrypt/live/api.deepseascreature.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.deepseascreature.com/privkey.pem;

    location / {
        proxy_pass http://api:8080;
    }
}

server {
    listen 80;
    server_name api.deepseascreature.com
    return 301 https://$host$request_uri;
}